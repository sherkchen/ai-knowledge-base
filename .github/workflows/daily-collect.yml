name: Daily Collect

on:
  schedule:
    - cron: '0 8 * * 5'   # 每周五 UTC 08:00 = Beijing 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER}}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        continue-on-error: true
        run: |
          FILES=$(find knowledge/articles -name "*.json" ! -name "*test*" ! -name "index.json" 2>/dev/null)
          if [ -n "$FILES" ]; then
            python hooks/validate_json.py $FILES || true
            FAILED=$(python hooks/validate_json.py --list-failed $FILES || true)
            if [ -n "$FAILED" ]; then
              echo "Removing failed articles..."
              echo "$FAILED" | xargs rm -f
            fi
          else
            echo "No article JSON files found, skipping validation."
          fi
        shell: bash

      - name: Check quality
        continue-on-error: true
        run: |
          FILES=$(find knowledge/articles -name "*.json" ! -name "*test*" ! -name "index.json" 2>/dev/null)
          if [ -n "$FILES" ]; then
            python hooks/check_quality.py $FILES || true
            C_FILES=$(python hooks/check_quality.py --list-c-files $FILES 2>/dev/null || true)
            if [ -n "$C_FILES" ]; then
              echo "Removing C‑grade / unparseable articles..."
              echo "$C_FILES" | xargs rm -f
            fi
          else
            echo "No article JSON files found, skipping quality check."
          fi
        shell: bash

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git add knowledge/raw/ knowledge/articles/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new data to commit."
            exit 0
          fi

          COUNT=$(git diff --cached --name-only | grep -c '/articles/.*\.json$' || true)
          DATE=$(date +%Y-%m-%d)
          git commit -m "📚 Collect ${COUNT} articles on ${DATE}"
          git push
